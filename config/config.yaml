data:
  dataset: "fashion" # mnist or fashion
  mnist_path: '../data/dataset/normal/mnist.pkl' # path to mnist.pkl file
  fashion_path: '../data/dataset/fashion' # path to fashion mnist directory containing the 4 archive files
  batch_size: 256

model:
  device: "cpu"
  arch: "c" # options: a,b,c,d
  epochs: 5
  early_stopping: false
  path : '../models/saved/mnist_model_c.pth' # path to model checkpoint set null when training
  freeze_backbone : true # freeze model backbone
optimizer:
  momentum: 0
  l2_penalty: 0.0001
  lr: 0.01
